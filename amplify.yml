version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - echo "DATABASE_URL=$DATABASE_URL" >> .env.production
        - echo "NEXTAUTH_SECRET=$NEXTAUTH_SECRET" >> .env.production
        - echo "NEXTAUTH_URL=$NEXTAUTH_URL" >> .env.production
        - echo "GITHUB_ID=$GITHUB_ID" >> .env.production
        - echo "GITHUB_SECRET=$GITHUB_SECRET" >> .env.production
        - echo "GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID" >> .env.production
        - echo "GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET" >> .env.production
        - echo "GROQ_API_KEY=$GROQ_API_KEY" >> .env.production
        - echo "TWELVE_DATA_API_KEY=$TWELVE_DATA_API_KEY" >> .env.production
        - echo "NEWSAPI_API_KEY=$NEWSAPI_API_KEY" >> .env.production
        - echo "NEWS_API_KEY=$NEWS_API_KEY" >> .env.production
        - echo "TAVILY_API_KEY=$TAVILY_API_KEY" >> .env.production
        - echo "ALPHA_VANTAGE_API_KEY=$ALPHA_VANTAGE_API_KEY" >> .env.production
        - echo "NEXT_PUBLIC_TWELVEDATA_API_KEY=$NEXT_PUBLIC_TWELVEDATA_API_KEY" >> .env.production
        - echo "NEXT_PUBLIC_GROQ_API_KEY=$NEXT_PUBLIC_GROQ_API_KEY" >> .env.production
        - echo "NEXT_PUBLIC_TAVILY_API_KEY=$NEXT_PUBLIC_TAVILY_API_KEY" >> .env.production
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*
